receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: dids-server
          scrape_interval: 5s
          static_configs:
            - targets: ["dids-server:9464"]

processors:
  batch: {}

exporters:
  debug:
    verbosity: basic
  prometheus:
    endpoint: "0.0.0.0:8889"

service:
  pipelines:
    metrics:
      receivers: [prometheus]
      processors: [batch]
      exporters: [debug, prometheus]
