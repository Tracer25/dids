apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: ClickHouse
    uid: clickhouse
    type: grafana-clickhouse-datasource
    access: proxy
    jsonData:
      defaultDatabase: dids
      host: clickhouse
      port: 8123
      protocol: http
      username: default
    secureJsonData:
      password: ""
